<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>다크 알럿 - 우리캐피탈</title>
  <link rel="stylesheet" href="../assets/css/jb-common.css">
  <link rel="stylesheet" href="../assets/css/jb-style.css">
  <style>
    /* ============================
       라이트 알럿 (.layerpop-wrap.type-light)
       기존 JBWRC.alert 함수의 새 옵션으로 추가 가능
       ============================ */

    /* 백드롭 - 화면 전체 살짝 어둡게 */
    .layerpop-wrap.type-light{position:fixed;left:0;right:0;top:0;bottom:0;background:rgba(20,30,50,.45);display:flex;align-items:center;justify-content:center;z-index:9999;padding:2rem;}

    /* 라이트 알럿 본체 */
    .layerpop-wrap.type-light .layerpop{position:relative;background:#FFFFFF;border-radius:2rem;padding:3.2rem 2.4rem 1.4rem;width:100%;max-width:34rem;box-shadow:0 1.6rem 4rem rgba(20,30,50,.18);}

    /* 닫기 X 버튼 */
    .layerpop-wrap.type-light .btn-close-pop{position:absolute;top:1.6rem;right:1.6rem;width:2.4rem;height:2.4rem;background:none;border:0;padding:0;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .layerpop-wrap.type-light .btn-close-pop::before,
    .layerpop-wrap.type-light .btn-close-pop::after{content:'';position:absolute;width:1.6rem;height:.18rem;background:#8A93A0;border-radius:.1rem;}
    .layerpop-wrap.type-light .btn-close-pop::before{transform:rotate(45deg);}
    .layerpop-wrap.type-light .btn-close-pop::after{transform:rotate(-45deg);}
    .layerpop-wrap.type-light .btn-close-pop:hover::before,
    .layerpop-wrap.type-light .btn-close-pop:hover::after{background:var(--primaryBlack);}

    /* 알럿 본문 */
    .layerpop-wrap.type-light .layerpop-body{padding:.4rem 0 2.4rem;text-align:center;}

    /* 타이틀 (2줄, 2번째 줄 강조) */
    .layerpop-wrap.type-light .alert-title{font-size:1.9rem;font-weight:700;line-height:2.8rem;color:var(--primaryBlack);letter-spacing:-0.02em;margin:0;}
    .layerpop-wrap.type-light .alert-title .highlight{color:var(--primaryBlue);display:inline-block;}

    /* 본문 설명 */
    .layerpop-wrap.type-light .alert-desc{margin-top:1.6rem;font-size:1.4rem;font-weight:400;line-height:2.1rem;color:var(--subTxt);letter-spacing:-0.01em;}

    /* 하단 버튼 (primary blue) */
    .layerpop-wrap.type-light .layerpop-footer{padding-top:.4rem;}
    .layerpop-wrap.type-light .layerpop-footer .btn-lg{width:100%;background:var(--primaryBlue);border-color:var(--primaryBlue);color:#FFFFFF;border-radius:1.2rem;padding:1.6rem;font-size:1.6rem;font-weight:600;border:0;cursor:pointer;font-family:inherit;}
    .layerpop-wrap.type-light .layerpop-footer .btn-lg:hover{background:#0455D0;}

    /* ============================
       데모용 배경 (스크린샷 재현 - 라이트 톤)
       ============================ */
    body{background:#F2F5FA;min-height:100vh;}
    .demo-bg{position:fixed;left:0;right:0;top:0;bottom:0;background:#F2F5FA;display:flex;flex-direction:column;}
    .demo-bg .demo-header{padding:1.6rem 2rem;display:flex;align-items:center;gap:1.2rem;color:var(--primaryBlack);font-size:1.6rem;font-weight:600;border-bottom:1px solid #E6EAF0;background:#FFFFFF;}
    .demo-bg .demo-icon{width:4rem;height:4rem;background:#F0F5FF;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:2rem;}
    .demo-bg .demo-content{flex:1;}

    /* 데모용 트리거 버튼 (페이지 우측 상단) */
    .demo-trigger{position:fixed;top:1.6rem;right:1.6rem;z-index:10000;padding:.8rem 1.6rem;background:#FFFFFF;color:var(--primaryBlack);border:1px solid var(--borderColor);border-radius:.8rem;font-size:1.2rem;font-weight:600;cursor:pointer;font-family:inherit;}
    .demo-trigger:hover{background:#F0F5FF;}
  </style>
</head>
<body>

  <!-- 배경 데모 (스크린샷의 한도조회 화면 재현) -->
  <div class="demo-bg" aria-hidden="true">
    <div class="demo-header">
      <div class="demo-icon">📻</div>
      <span>한도조회</span>
    </div>
    <div class="demo-content"></div>
  </div>

  <button type="button" class="demo-trigger" onclick="document.getElementById('darkAlert').style.display='flex'">알럿 다시 보기</button>

  <!-- 다크 알럿 (JBWRC.alert이 type-light 옵션 사용 시 이 마크업을 생성) -->
  <div class="layerpop-wrap type-light" id="darkAlert" role="dialog" aria-modal="true" aria-labelledby="darkAlertTitle">
    <div class="layerpop">

      <button type="button" class="btn-close-pop" aria-label="닫기"
              onclick="document.getElementById('darkAlert').style.display='none'"></button>

      <div class="layerpop-body">
        <h2 class="alert-title" id="darkAlertTitle">
          잠깐, 앱 설치 없이<br>
          <span class="highlight">더 빠르게 조회해볼까요?</span>
        </h2>
        <p class="alert-desc">앱 설치 없이 웹에서 바로 한도를 확인할 수 있어요.</p>
      </div>

      <div class="layerpop-footer">
        <button type="button" class="btn-lg"
                onclick="document.getElementById('darkAlert').style.display='none'">웹으로 계속하기</button>
      </div>

    </div>
  </div>

  <!-- ============================
       JBWRC.alert에서 사용할 호출 예시 (참고용 주석)
       ============================
       JBWRC.alert('앱 설치 없이 웹에서 바로 한도를 확인할 수 있어요.', {
           type: 'light',                                // 새 옵션: 라이트 알럿
           bodyTitle: '잠깐, 앱 설치 없이<br><span class="highlight">더 빠르게 조회해볼까요?</span>',
           okBtnText: setMultiLangData('웹으로 계속하기'),
           okCallback: function(){}
       });
  -->

</body>
</html>

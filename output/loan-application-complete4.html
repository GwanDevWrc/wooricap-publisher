<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>대출 신청 완료 - 상담원 안내 - 우리캐피탈</title>
  <link rel="stylesheet" href="../assets/css/jb-common.css">
  <link rel="stylesheet" href="../assets/css/jb-style.css">
  <style>
    /* 시안 전용 보강 스타일 (디자인 시스템에 정확히 매칭되는 패턴이 없는 부분만 최소 추가) */

    /* 헤더 - 뒤로가기만 (진행 바 없음, 단순 완료 화면 변형) */
    .simple-header{position:relative;display:flex;align-items:center;height:5.6rem;padding:0 1.6rem;background:var(--primaryWhite);}
    .simple-header .btn-back{width:2.4rem;height:2.4rem;border:0;background:transparent url('../assets/img/icon/ico_back.svg') center no-repeat;background-size:contain;cursor:pointer;}

    /* 완료 체크 아이콘 */
    .finish-check-icon{display:flex;justify-content:center;margin-bottom:2.4rem;}
    .finish-check-icon img{width:8rem;height:8rem;display:block;}

    /* finish-txt-wrap 시안 톤에 맞춘 미세 조정 (배경 이미지 ::before 비활성화) */
    .finish-txt-wrap.type-check{margin-top:1.6rem;margin-bottom:0;padding-top:0;}
    .finish-txt-wrap.type-check::before{display:none;}
    .finish-txt-wrap .finish-tit{font-size:2.2rem;line-height:3.2rem;letter-spacing:-0.02em;font-weight:700;}
    .finish-txt-wrap .finish-desc{padding-top:1.6rem;font-size:1.4rem;font-weight:400;line-height:2.2rem;color:var(--subTxt);}

    /* 안내 텍스트 (회색 ! 아이콘 + 본문) */
    .notice-row{margin-top:3.2rem;display:flex;gap:.8rem;align-items:flex-start;padding:0 .4rem;}
    .notice-row img{flex:0 0 1.6rem;width:1.6rem;height:1.6rem;margin-top:.3rem;display:block;}
    .notice-row p{flex:1;font-size:1.3rem;font-weight:400;line-height:2rem;color:var(--subTxt);}

    /* 즉시 전화 연결 카드 */
    .call-card{margin-top:1.6rem;padding:1.6rem 1.6rem 1.6rem 2rem;background:#F5F7FA;border-radius:1.2rem;display:flex;align-items:center;gap:1.2rem;}
    .call-card .call-label{flex:1;font-size:1.5rem;font-weight:600;color:var(--primaryBlack);line-height:2.2rem;}
    .call-card .btn-call{flex:0 0 4.8rem;width:4.8rem;height:4.8rem;border:0;border-radius:1rem;background:var(--primaryBlue);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
    .call-card .btn-call:hover{background:#0454CC;}
    .call-card .btn-call img{width:2.4rem;height:2.4rem;display:block;}

    /* 화면 본문 영역 - 하단 고정 버튼만큼 패딩 */
    .complete-contents{padding:0 2rem 12rem;}

    /* 하단 고정 버튼 영역 */
    .btn-fixed-bottom{position:fixed;left:0;right:0;bottom:0;padding:1.2rem 2rem 2.4rem;background:var(--primaryWhite);}
    .btn-fixed-bottom .btn-lg{width:100%;}
  </style>
</head>
<body class="finish-ui">
  <div class="wrapper">
    <header id="header">
      <div class="simple-header">
        <button class="btn-back" type="button" aria-label="뒤로가기"></button>
      </div>
    </header>

    <main id="main">
      <div class="complete-contents">

        <div class="finish-check-icon" aria-hidden="true">
          <img src="../assets/img/icon/ico_finish_check_new.svg" alt="">
        </div>

        <div class="finish-txt-wrap type-check">
          <p class="finish-tit">대출 신청이 완료되어<br>상담원이 안내드릴 예정이에요</p>
          <p class="finish-desc">소유차량 근저당권 보유고객의 경우,<br>추가서류 확인이 필요하여 상담원이 유선으로<br>계약체결 진행을 도와드릴게요.</p>
        </div>

        <div class="notice-row" role="note">
          <img src="../assets/img/icon/ico_warning_gray.svg" alt="" aria-hidden="true">
          <p>평일 9시 ~ 17시 외 또는 주말 및 공휴일 계약 신청건은 익영업일에 상담원 안내 후 진행될 예정이에요.</p>
        </div>

        <div class="call-card">
          <p class="call-label">즉시전화 연결<br><span style="font-size:1.2rem;font-weight:400;color:var(--subTxt);">영업일 9시 ~ 17시</span></p>
          <button class="btn-call" type="button" aria-label="즉시 전화 연결">
            <img src="../assets/img/icon/ico_call_white.svg" alt="">
          </button>
        </div>

      </div>

      <div class="btn-fixed-bottom">
        <button type="button" class="btn-lg btn-primary">상담원 전화 신청</button>
      </div>
    </main>
  </div>

  <script src="../assets/js/jquery/jquery-3.6.1.min.js"></script>
  <script src="../assets/js/jquery/jquery.tmpl.js"></script>
  <script src="../assets/js/cmm/js.cookie.min.js"></script>
  <script src="../assets/js/cmm/jbwrcUtil.js"></script>
  <script src="../assets/js/cmm/jbwrcFnc.js"></script>
  <script src="../assets/js/cmm/jbwrcEvent.js"></script>
  <script src="../assets/js/ui/jb-layout.js"></script>
  <script src="../assets/js/ui/jb-ui.js"></script>
</body>
</html>
